<!DOCTYPE html>
<html lang="hi-en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Free Mock Test Platform for SSC, Railway, Police & Competitive Exams. Practice with 55+ questions, timer, negative marking, and detailed analysis.">
  <meta name="keywords" content="mock test, SSC, Railway, Police, competitive exam, practice test, quiz, online test">
  <meta name="author" content="MockTestPro">
  <meta name="theme-color" content="#060a13">

  <title>MockTestPro — Free Mock Tests for SSC, Railway & More</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">

  <style>
    .splash-loader {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    .splash-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .splash-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--bg-glass);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Splash loader -->
  <div class="splash-loader" id="splash">
    <div class="splash-spinner"></div>
  </div>

  <!-- App Mount Point -->
  <div id="app"></div>

  <!-- Supabase JS Client CDN (pinned v2) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Scripts (order matters) -->
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/storage.js"></script>
  <script src="js/engine/testEngine.js"></script>
  <script src="js/utils/tracker.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/setup.js"></script>
  <script src="js/pages/test.js"></script>
  <script src="js/pages/result.js"></script>
  <script src="js/pages/leaderboard.js"></script>
  <script src="js/pages/analytics.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Hide splash once app finishes loading (success or error)
    function hideSplash() {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(() => splash.remove(), 400);
      }
    }

    // Check every 200ms if app finished init
    const _splashCheck = setInterval(() => {
      if (App && App.questionsLoaded) {
        clearInterval(_splashCheck);
        hideSplash();
      }
    }, 200);

    // Fallback: always hide after 5 seconds
    setTimeout(() => {
      clearInterval(_splashCheck);
      hideSplash();
    }, 5000);
  </script>
</body>
</html>
