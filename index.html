  <script>
    // Hide splash once app finishes loading
    function hideSplash() {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(() => splash.remove(), 300);
      }
    }

    const _splashCheck = setInterval(() => {
      if (App && App.questionsLoaded) {
        clearInterval(_splashCheck);
        hideSplash();
      }
    }, 200);

    // Fallback: always hide after 5 seconds
    setTimeout(() => {
      clearInterval(_splashCheck);
      hideSplash();
    }, 5000);
  </script>

  const bg = document.createElement('div');
  bg.id = 'particles-bg';
  bg.setAttribute('aria-hidden', 'true');
  for (let i = 0; i < 30; i++) {
    bg.appendChild(document.createElement('span'));
  }
  document.body.insertBefore(bg, document.body.firstChild);

  /* ── Theme detection ── */
  function isDarkMode() {
    const html = document.documentElement;
    const body = document.body;
    // Explicit dark theme attribute
    if (html.getAttribute('data-theme') === 'dark') return true;
    if (body.getAttribute('data-theme') === 'dark') return true;
    // Explicit light theme attribute
    if (html.getAttribute('data-theme') === 'light') return false;
    if (body.getAttribute('data-theme') === 'light') return false;
    // Exam landing pages (data-board) always use dark background
    if (html.hasAttribute('data-board') || body.hasAttribute('data-board')) return true;
    // CSS class-based dark mode
    if (html.classList.contains('dark') || body.classList.contains('dark')) return true;
    // System preference fallback
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function applyTheme() {
    const dark = isDarkMode();
    bg.className = dark ? 'pb-dark' : 'pb-light';
  }

  applyTheme();

  /* ── Watch for theme changes (home page dark/light toggle) ── */
  const observer = new MutationObserver(applyTheme);
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme', 'class'] });
  observer.observe(document.body, { attributes: true, attributeFilter: ['data-theme', 'class'] });

  /* ── System dark mode change ── */
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
