  <style>
    /* Initial splash — only spinner allowed in entire app */
    .splash-loader {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.15s ease;
    }
    .splash-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .splash-spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid var(--border-color, #E2E8F0);
      border-top-color: var(--primary, #4F46E5);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <script>
    // Splash: hide once app is ready
    function hideSplash() {
      const s = document.getElementById('splash');
      if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 150); }
    }
    const _sc = setInterval(() => {
      if (typeof App !== 'undefined' && App.questionsLoaded) { clearInterval(_sc); hideSplash(); }
    }, 200);
    setTimeout(() => { clearInterval(_sc); hideSplash(); }, 5000);
  </script>

  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => setInterval(() => reg.update(), 30 * 60 * 1000))
          .catch(() => {});
      });
    }
  </script>
