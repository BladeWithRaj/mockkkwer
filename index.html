  <style>
    .splash-loader {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .splash-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .splash-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--bg-glass);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <script>
    // Hide splash once app finishes loading (success or error)
    function hideSplash() {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(() => splash.remove(), 400);
      }
    }

    // Check every 200ms if app finished init
    const _splashCheck = setInterval(() => {
      if (App && App.questionsLoaded) {
        clearInterval(_splashCheck);
        hideSplash();
      }
    }, 200);

    // Fallback: always hide after 5 seconds
    setTimeout(() => {
      clearInterval(_splashCheck);
      hideSplash();
    }, 5000);
  </script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => {
            console.log('[PWA] Service Worker registered:', reg.scope);
            // Check for updates every 30 minutes
            setInterval(() => reg.update(), 30 * 60 * 1000);
          })
          .catch(err => console.warn('[PWA] SW registration failed:', err));
      });

      // Handle SW update — notify user
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        console.log('[PWA] New version available, reloading...');
      });
    }
  </script>
