<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <title>Control Panel</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="/css/admin-console.css">
</head>
<body>
  <div class="admin-guard" id="authGuard">
    <div class="guard-msg"><span class="guard-spin"></span> Verifying session...</div>
  </div>

  <div id="adminShell" style="display:none;">
    <div class="console-topbar">
      <div class="topbar-left">
        <span class="topbar-title">🔒 Control Panel</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-user"><span class="topbar-dot"></span><span id="adminName">admin</span></span>
        <button class="topbar-logout" onclick="adminLogout()">Logout</button>
      </div>
    </div>

    <div class="console-tabs" id="adminTabs">
      <div class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 Dashboard</div>
      <div class="tab" data-tab="questions" onclick="switchTab('questions')">📋 Questions</div>
      <div class="tab" data-tab="add" onclick="switchTab('add')">➕ Add Question</div>
      <div class="tab" data-tab="import" onclick="switchTab('import')">📥 Bulk Import</div>
      <div class="tab" data-tab="exams" onclick="switchTab('exams')">🎯 Exams</div>
      <div class="tab" data-tab="poly" onclick="switchTab('poly')">🎓 Polytechnic</div>
      <div class="tab" data-tab="users" onclick="switchTab('users')">👥 Users</div>
      <div class="tab" data-tab="activity" onclick="switchTab('activity')">📜 Activity</div>
      <div class="tab" data-tab="security" onclick="switchTab('security')">🛡️ Security</div>
    </div>

    <div class="console-content" id="adminContent"></div>
  </div>

  <script src="/js/admin/poly.js"></script>
  <script>
  // ═══════════════════════════════════════
  // ADMIN CONSOLE — Content Operating System
  // ═══════════════════════════════════════

  let adminUser = null, currentTab = 'dashboard';
  let qPage = 1, qSearch = '', qSubject = '';
  const ADMIN_TOKEN = localStorage.getItem('admin_token');

  // ── Auth Guard (Bearer token from localStorage) ──
  (async () => {
    // Bypassed for no-login mode
    // if (!ADMIN_TOKEN) { window.location.href = '/secure-admin-login/'; return; }
    try {
      // const r = await fetch('/api/admin-verify', { headers: { 'Authorization': 'Bearer ' + ADMIN_TOKEN } });
      // const d = await r.json();
      // if (!d.valid) throw 0;
      
      // Mock admin user
      adminUser = { username: 'AdminGuest', role: 'admin' };
      
      // Initialize AdminCore for external modules
      window.AdminCore = {
        token: ADMIN_TOKEN || 'dummy-token',
        user: adminUser,
        showToast: showToast
      };
      document.getElementById('adminName').textContent = adminUser.username;
      document.getElementById('authGuard').style.display = 'none';
      document.getElementById('adminShell').style.display = 'block';
      loadTab('dashboard');
    } catch(e) { console.error('Admin init error', e); /* localStorage.removeItem('admin_token'); window.location.href = '/secure-admin-login/'; */ }
  })();

  function switchTab(t) {
    currentTab = t;
    document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === t));
    loadTab(t);
  }

  async function loadTab(t) {
    const el = document.getElementById('adminContent');
    el.innerHTML = '<div class="loading"><span class="guard-spin"></span> Loading...</div>';
    try {
      switch(t) {
        case 'dashboard': await renderDashboard(el); break;
        case 'questions': await renderQuestions(el); break;
        case 'add': renderAddQuestion(el); break;
        case 'import': renderBulkImport(el); break;
        case 'exams': await renderExams(el); break;
        case 'poly': await renderPolyTab(el); break;
        case 'users': await renderUsers(el); break;
        case 'activity': await renderActivity(el); break;
        case 'security': renderSecurity(el); break;
      }
    } catch(e) { el.innerHTML = `<div class="empty">❌ ${e.message}</div>`; }
  }

  // ── API Helper (Bearer token, no cookies/CSRF) ──
  async function adminAPI(action, body = null) {
    const opts = { headers: { 'Authorization': 'Bearer ' + ADMIN_TOKEN } };
    let url = `/api/admin-data?action=${action}`;
    if (body) {
      opts.method = 'POST';
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const r = await fetch(url, opts);
    if (r.status === 401) { console.warn('401 ignored for no-login mode'); /* localStorage.removeItem('admin_token'); window.location.href = '/secure-admin-login/'; throw new Error('Session expired'); */ }
    const d = await r.json();
    if (!d.success && d.error) throw new Error(d.error);
    return d;
  }

  // ═══════════════ DASHBOARD ═══════════════
  async function renderDashboard(el) {
    const d = await adminAPI('dashboard');
    const s = d.stats;
    const subs = Object.entries(s.subjectDistribution || {});
    el.innerHTML = `
      <div class="metric-grid">
        <div class="metric-card"><div class="metric-label">Questions</div><div class="metric-value">${s.totalQuestions}</div></div>
        <div class="metric-card"><div class="metric-label">Users</div><div class="metric-value">${s.totalUsers}</div></div>
        <div class="metric-card"><div class="metric-label">Total Tests</div><div class="metric-value">${s.totalTests}</div></div>
        <div class="metric-card"><div class="metric-label">Tests (7d)</div><div class="metric-value">${s.recentTests}</div></div>
      </div>
      <div class="sec-card">
        <div class="sec-title">📚 Subject Distribution</div>
        ${subs.length === 0 ? '<div class="empty">No questions yet</div>' :
          subs.map(([sub,c]) => `<div class="dist-row"><span class="dist-name">${sub}</span><div class="dist-bar-wrap"><div class="dist-bar" style="width:${Math.round(c/s.totalQuestions*100)}%"></div></div><span class="dist-count">${c}</span></div>`).join('')}
      </div>
      <div class="sec-card">
        <div class="sec-title">🛡️ Recent Login Activity</div>
        ${!(d.loginLog||[]).length ? '<div class="empty">No activity</div>' : `
          <table class="dtable"><thead><tr><th>Time</th><th>User</th><th>Status</th><th>Reason</th><th>IP</th></tr></thead><tbody>
          ${d.loginLog.map(l => `<tr><td>${new Date(l.created_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</td><td>${l.username}</td><td class="${l.success?'ok':'fail'}">${l.success?'✓ OK':'✗ FAIL'}</td><td>${l.reason||'-'}</td><td class="mono">${l.ip_address||'-'}</td></tr>`).join('')}
          </tbody></table>`}
      </div>`;
  }

  // ═══════════════ QUESTIONS ═══════════════
  async function renderQuestions(el) {
    const params = new URLSearchParams({ action:'questions', page:qPage, search:qSearch });
    if (qSubject) params.set('subject', qSubject);
    const r = await fetch(`/api/admin-data?${params}`, { credentials:'include' });
    if (r.status === 401) { console.warn('401 ignored in no-login mode'); /* return window.location.href = '/secure-admin-login/'; */ }
    const d = await r.json();
    if (!d.success) throw new Error(d.error);
    const labels = ['A','B','C','D'];

    el.innerHTML = `
      <div class="toolbar">
        <input type="text" placeholder="Search questions..." value="${qSearch}" id="qSearch" class="tool-input" onkeydown="if(event.key==='Enter'){qSearch=this.value;qPage=1;loadTab('questions')}">
        <select class="tool-select" onchange="qSubject=this.value;qPage=1;loadTab('questions')">
          <option value="">All Subjects</option>
          ${['math','gk','reasoning','english','hindi','science','polity','geography','history'].map(s=>`<option value="${s}" ${qSubject===s?'selected':''}>${s}</option>`).join('')}
        </select>
        <button class="tool-btn" onclick="qSearch=document.getElementById('qSearch').value;qPage=1;loadTab('questions')">Search</button>
      </div>
      <div class="sec-card">
        <div class="sec-title">📋 Questions (${d.total} total — Page ${d.page}/${d.totalPages||1})</div>
        ${d.questions.length===0 ? '<div class="empty">No questions found</div>' :
          d.questions.map(q => `
            <div class="q-row">
              <div class="q-body">
                <div class="q-text">${q.question_en||'-'}</div>
                ${q.question_hi ? `<div class="q-hi">${q.question_hi}</div>` : ''}
                <div class="q-options">${(q.options_en||[]).map((o,i)=>`<span class="q-opt ${i===q.correct_index?'correct':''}">${labels[i]}. ${o}</span>`).join('')}</div>
                <div class="q-meta">
                  <span class="chip-s chip-subj">${q.subject||'general'}</span>
                  <span class="chip-s chip-diff-${q.difficulty||'medium'}">${q.difficulty||'medium'}</span>
                  ${q.board?`<span class="chip-s chip-board">${q.board}</span>`:''}
                  ${q.topic?`<span class="chip-s chip-topic">${q.topic}</span>`:''}
                  ${q.year?`<span class="chip-s chip-year">${q.year}</span>`:''}
                  <span class="q-id">ID: ${q.id}</span>
                </div>
              </div>
              <div class="q-actions">
                <button class="act-btn" onclick="editQuestion(${q.id})" title="Edit">✏️</button>
                <button class="act-btn danger" onclick="deleteQuestion(${q.id})" title="Delete">🗑️</button>
              </div>
            </div>`).join('')}
      </div>
      <div class="paginator">
        <button ${qPage<=1?'disabled':''} onclick="qPage--;loadTab('questions')">← Prev</button>
        <span class="page-info">Page ${d.page} / ${d.totalPages||1}</span>
        <button ${qPage>=d.totalPages?'disabled':''} onclick="qPage++;loadTab('questions')">Next →</button>
      </div>`;
  }

  async function deleteQuestion(id) {
    if (!confirm('Delete this question permanently?')) return;
    try {
      await adminAPI('delete-question', { id });
      showToast('Question deleted','success');
      loadTab('questions');
    } catch(e) { showToast(e.message,'error'); }
  }

  function editQuestion(id) {
    // Fetch and populate the add form with existing data
    renderEditQuestion(id);
  }

  async function renderEditQuestion(id) {
    const el = document.getElementById('adminContent');
    el.innerHTML = '<div class="loading"><span class="guard-spin"></span> Loading question...</div>';
    // Fetch the specific question from the questions list
    const r = await fetch(`/api/admin-data?action=questions&search=&page=1`, { credentials:'include' });
    const d = await r.json();
    const q = (d.questions||[]).find(x => x.id === id);
    if (!q) { showToast('Question not found','error'); return switchTab('questions'); }
    renderAddQuestion(el, q);
  }

  // ═══════════════ ADD / EDIT QUESTION ═══════════════
  function renderAddQuestion(el, editData = null) {
    const q = editData || { question_en:'', question_hi:'', options_en:['','','',''], options_hi:['','','',''], correct_index:0, subject:'math', difficulty:'medium', board:'', topic:'', year:'', exam:'', source:'', marks:'' };
    const isEdit = !!editData;
    const labels = ['A','B','C','D'];

    el.innerHTML = `
      <div class="sec-card">
        <div class="sec-title">${isEdit ? '✏️ Edit Question #'+q.id : '➕ Add New Question'}</div>
        <form id="questionForm" onsubmit="return false;">
          <div class="form-grid">
            <div class="form-group full">
              <label>Question (English) *</label>
              <textarea id="f_qen" rows="3" required>${q.question_en||''}</textarea>
            </div>
            <div class="form-group full">
              <label>Question (Hindi)</label>
              <textarea id="f_qhi" rows="3">${q.question_hi||''}</textarea>
            </div>
            <div class="form-group full">
              <label>Options (English) *</label>
              <div class="opts-grid">
                ${(q.options_en||['','','','']).map((o,i) => `<div class="opt-row"><span class="opt-label">${labels[i]}</span><input type="text" id="f_oen${i}" value="${o}" placeholder="Option ${labels[i]}" required></div>`).join('')}
              </div>
            </div>
            <div class="form-group full">
              <label>Options (Hindi)</label>
              <div class="opts-grid">
                ${(q.options_hi||['','','','']).map((o,i) => `<div class="opt-row"><span class="opt-label">${labels[i]}</span><input type="text" id="f_ohi${i}" value="${o||''}" placeholder="विकल्प ${labels[i]}"></div>`).join('')}
              </div>
            </div>
            <div class="form-group">
              <label>Correct Answer *</label>
              <div class="correct-btns" id="correctBtns">
                ${labels.map((l,i) => `<button type="button" class="cor-btn ${q.correct_index===i?'active':''}" onclick="setCorrect(${i})">${l}</button>`).join('')}
              </div>
            </div>
            <div class="form-group"><label>Subject *</label>
              <select id="f_subject">${['math','gk','reasoning','english','hindi','science','polity','geography','history'].map(s=>`<option value="${s}" ${q.subject===s?'selected':''}>${s}</option>`).join('')}</select>
            </div>
            <div class="form-group"><label>Difficulty</label>
              <select id="f_diff">${['easy','medium','hard'].map(d=>`<option value="${d}" ${q.difficulty===d?'selected':''}>${d}</option>`).join('')}</select>
            </div>
            <div class="form-group"><label>Board</label><input type="text" id="f_board" value="${q.board||''}" placeholder="SSC, Railway..."></div>
            <div class="form-group"><label>Exam</label><input type="text" id="f_exam" value="${q.exam||''}" placeholder="CGL, NTPC..."></div>
            <div class="form-group"><label>Topic</label><input type="text" id="f_topic" value="${q.topic||''}" placeholder="Algebra, Polity..."></div>
            <div class="form-group"><label>Year (PYQ)</label><input type="text" id="f_year" value="${q.year||''}" placeholder="2023"></div>
            <div class="form-group"><label>Source</label><input type="text" id="f_source" value="${q.source||''}" placeholder="Official paper, Book..."></div>
            <div class="form-group"><label>Marks</label><input type="number" id="f_marks" value="${q.marks||''}" placeholder="2" step="0.25"></div>
          </div>
          <div class="form-actions">
            <button type="button" class="save-btn" id="saveBtn" onclick="saveQuestion(${isEdit?q.id:'null'})">${isEdit?'💾 Update':'➕ Add'} Question</button>
            ${isEdit?'<button type="button" class="cancel-btn" onclick="switchTab(\'questions\')">Cancel</button>':''}
          </div>
        </form>
      </div>`;
    window._correctIdx = q.correct_index || 0;
  }

  function setCorrect(i) {
    window._correctIdx = i;
    document.querySelectorAll('.cor-btn').forEach((b,j) => b.classList.toggle('active', j===i));
  }

  async function saveQuestion(editId) {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = '⏳ Saving...';
    try {
      const payload = {
        question_en: document.getElementById('f_qen').value.trim(),
        question_hi: document.getElementById('f_qhi').value.trim() || null,
        options_en: [0,1,2,3].map(i => document.getElementById(`f_oen${i}`).value.trim()),
        options_hi: [0,1,2,3].map(i => document.getElementById(`f_ohi${i}`).value.trim()).filter(Boolean).length === 4
          ? [0,1,2,3].map(i => document.getElementById(`f_ohi${i}`).value.trim()) : null,
        correct_index: window._correctIdx,
        subject: document.getElementById('f_subject').value,
        difficulty: document.getElementById('f_diff').value,
        board: document.getElementById('f_board').value.trim() || null,
        exam: document.getElementById('f_exam').value.trim() || null,
        topic: document.getElementById('f_topic').value.trim() || null,
        year: document.getElementById('f_year').value.trim() || null,
        source: document.getElementById('f_source').value.trim() || null,
        marks: document.getElementById('f_marks').value ? parseFloat(document.getElementById('f_marks').value) : null
      };

      if (!payload.question_en) throw new Error('Question text required');
      if (payload.options_en.some(o => !o)) throw new Error('All 4 options required');

      if (editId) {
        payload.id = editId;
        await adminAPI('edit-question', payload);
        showToast('Question updated!','success');
      } else {
        await adminAPI('create-question', payload);
        showToast('Question added!','success');
      }
      switchTab('questions');
    } catch(e) {
      showToast(e.message,'error');
      btn.disabled = false; btn.textContent = editId ? '💾 Update' : '➕ Add';
    }
  }

  // ═══════════════ BULK IMPORT ═══════════════
  function renderBulkImport(el) {
    el.innerHTML = `
      <div class="sec-card">
        <div class="sec-title">📥 Bulk CSV Import</div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('csvFile').click()"
          ondragover="event.preventDefault();this.classList.add('hover')" ondragleave="this.classList.remove('hover')"
          ondrop="event.preventDefault();this.classList.remove('hover');handleFile(event.dataTransfer.files[0])">
          <div style="font-size:40px;opacity:.5">📁</div>
          <div>Click or drag CSV file</div>
          <div class="upload-hint">question,option_a,option_b,option_c,option_d,correct,subject,difficulty,board,topic,year</div>
          <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="handleFile(this.files[0])">
        </div>
        <button class="tool-btn" style="margin-top:12px" onclick="downloadTemplate()">📄 Download CSV Template</button>
      </div>
      <div id="importPreview"></div>`;
  }

  function downloadTemplate() {
    const csv = 'question,option_a,option_b,option_c,option_d,correct,subject,difficulty,board,exam,topic,year,source\n"What is 2+2?","3","4","5","6","B","math","easy","SSC","CGL","Arithmetic","2023","PYQ"';
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'question_template.csv'; a.click();
  }

  function handleFile(file) {
    if (!file || !file.name.endsWith('.csv')) return showToast('CSV file required','error');
    const reader = new FileReader();
    reader.onload = (e) => parseCSV(e.target.result);
    reader.readAsText(file);
  }

  function parseCSV(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length < 2) return showToast('CSV has no data rows','error');
    const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim().toLowerCase());
    const correctMap = {a:0,b:1,c:2,d:3};
    const questions = [];
    const errors = [];

    for (let i = 1; i < lines.length; i++) {
      const vals = parseCSVLine(lines[i]);
      const get = (name) => { const idx = headers.indexOf(name); return idx >= 0 ? vals[idx] : ''; };
      const q = get('question'), oa = get('option_a'), ob = get('option_b'), oc = get('option_c'), od = get('option_d');
      const cor = get('correct').toUpperCase();
      if (!q || !oa || !ob) { errors.push(`Row ${i+1}: missing question/options`); continue; }
      if (!correctMap.hasOwnProperty(cor.toLowerCase())) { errors.push(`Row ${i+1}: invalid correct answer "${cor}"`); continue; }
      questions.push({
        question_en: q, options_en: [oa,ob,oc||'',od||''], correct_index: correctMap[cor.toLowerCase()],
        subject: get('subject')||'general', difficulty: get('difficulty')||'medium',
        board: get('board')||null, exam: get('exam')||null, topic: get('topic')||null,
        year: get('year')||null, source: get('source')||null
      });
    }

    window._pendingImport = questions;
    const prev = document.getElementById('importPreview');
    prev.innerHTML = `
      <div class="sec-card">
        <div class="sec-title">Preview: ${questions.length} questions parsed ${errors.length?`(${errors.length} errors)`:''}</div>
        ${errors.length?`<div class="import-errors">${errors.map(e=>`<div>${e}</div>`).join('')}</div>`:''}
        ${questions.slice(0,20).map((q,i) => `<div class="q-row compact"><div class="q-body"><div class="q-text">${q.question_en}</div><div class="q-meta"><span class="chip-s chip-subj">${q.subject}</span><span class="chip-s chip-diff-${q.difficulty}">${q.difficulty}</span>${q.board?`<span class="chip-s chip-board">${q.board}</span>`:''}</div></div></div>`).join('')}
        ${questions.length>20?`<div class="empty">...and ${questions.length-20} more</div>`:''}
        <button class="save-btn" style="margin-top:16px" onclick="confirmImport()" id="importBtn">✅ Import ${questions.length} Questions</button>
      </div>`;
  }

  function parseCSVLine(line) {
    const result = []; let current = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
      else { current += ch; }
    }
    result.push(current.trim());
    return result;
  }

  async function confirmImport() {
    if (!window._pendingImport?.length) return;
    const btn = document.getElementById('importBtn');
    btn.disabled = true; btn.textContent = '⏳ Importing...';
    try {
      const d = await adminAPI('bulk-import', { questions: window._pendingImport });
      const msg = `✅ Imported: ${d.imported} | Rejected: ${d.rejected || 0} | Duplicates: ${d.duplicates || 0}`;
      showToast(msg, 'success');
      if (d.duplicates > 0 || d.rejected > 0) {
        document.getElementById('importPreview').innerHTML = `<div class="sec-card">
          <div class="sec-title">📊 Import Report</div>
          <div style="display:flex;gap:12px;margin-bottom:8px;">
            <span class="chip-s chip-diff-easy">✅ Imported: ${d.imported}</span>
            <span class="chip-s chip-diff-hard">❌ Rejected: ${d.rejected || 0}</span>
            <span class="chip-s chip-diff-medium">🔁 Duplicates: ${d.duplicates || 0}</span>
          </div>
          ${(d.duplicateItems||[]).length ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Duplicate samples: ${d.duplicateItems.join('; ')}</div>` : ''}
        </div>`;
      } else {
        window._pendingImport = [];
        switchTab('questions');
      }
    } catch(e) { showToast(e.message,'error'); btn.disabled = false; btn.textContent = '✅ Import'; }
  }

  // ═══════════════ USERS ═══════════════
  // ═══════════════ EXAM CONFIGS ═══════════════
  async function renderExams(el) {
    const d = await adminAPI('all-exams');
    const exams = d.exams || [];
    const boards = [...new Set(exams.map(e => e.board || e.category))];
    const statusColors = { draft: '#f59e0b', published: '#10b981', archived: '#6b7280', disabled: '#ef4444' };
    const statusIcons = { draft: '📝', published: '🟢', archived: '📦', disabled: '🔴' };

    el.innerHTML = `
      <div class="sec-card">
        <div class="sec-title">🎯 Exam Configurations (${exams.length})</div>
        <div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;">
          <button class="tool-btn" onclick="renderAddExam()">➕ Add New Exam</button>
          <button class="tool-btn" onclick="backfillHashes()" style="background:var(--surface-alt,#2a2a3e);">🔄 Backfill Q-Hashes</button>
        </div>
        ${boards.map(board => `
          <div style="margin-bottom:16px;">

  // ── Client-Side Exam Config Validator (mirrors server-side) ──
  const SLUG_RE = /^[a-z0-9]+(-[a-z0-9]+)*$/;
  const VALID_RENDERERS = ['ssc','railway','banking','upsc'];
  const VALID_BOARDS = ['SSC','Railway','Banking','UPSC','Teaching','Defence','State','Quick','Daily'];
  const VALID_PALETTES = ['default','ibps','paper'];
  const VALID_SUBJECTS = ['math','reasoning','english','hindi','gk','science','history','geography','polity','all'];

  function validateExamClient(config, isUpdate) {
    const errors = [];

    // Slug
    if (!isUpdate) {
      if (!config.slug) errors.push('Slug is required');
      else if (!SLUG_RE.test(config.slug)) errors.push('Slug must be kebab-case (a-z, 0-9, hyphens). Got: "' + config.slug + '"');
      else if (config.slug.length < 2 || config.slug.length > 50) errors.push('Slug must be 2-50 characters');
    }

    // Exam name
    if (!config.exam_name || config.exam_name.length < 2) errors.push('Exam name required (min 2 chars)');

    // Renderer
    if (config.renderer_type && !VALID_RENDERERS.includes(config.renderer_type))
      errors.push('Renderer must be: ' + VALID_RENDERERS.join(', ') + '. Got: "' + config.renderer_type + '"');

    // Board
    if (config.board && !VALID_BOARDS.includes(config.board))
      errors.push('Board must be: ' + VALID_BOARDS.join(', ') + '. Got: "' + config.board + '"');

    // Duration
    const dur = Number(config.duration_minutes);
    if (isNaN(dur) || dur <= 0 || dur > 600) errors.push('Duration must be 1-600 minutes');

    // Total questions
    const tq = Number(config.total_questions);
    if (isNaN(tq) || tq <= 0 || tq > 1000) errors.push('Total questions must be 1-1000');

    // Marks per question
    const mpq = Number(config.marks_per_question);
    if (isNaN(mpq) || mpq <= 0 || mpq > 10) errors.push('Marks/question must be 0.25-10');

    // Negative marking
    const neg = Number(config.negative_marking);
    if (isNaN(neg) || neg < 0 || neg > 5) errors.push('Negative marking must be 0-5');

    // Sections
    const secs = config.sections || [];
    if (secs.length === 0 && !isUpdate) errors.push('At least 1 section required');
    let secTotal = 0;
    secs.forEach((s, i) => {
      if (!s.name || !s.name.trim()) errors.push(`Section ${i+1}: name is required`);
      if (!s.subject) errors.push(`Section ${i+1}: subject is required`);
      else if (!VALID_SUBJECTS.includes(s.subject.toLowerCase())) errors.push(`Section ${i+1}: invalid subject "${s.subject}"`);
      const sq = Number(s.questions);
      if (isNaN(sq) || sq <= 0) errors.push(`Section ${i+1}: questions must be > 0`);
      else secTotal += sq;
      if (s.sectionTime !== undefined && s.sectionTime !== null && s.sectionTime !== '') {
        const st = Number(s.sectionTime);
        if (isNaN(st) || st <= 0) errors.push(`Section ${i+1}: sectionTime must be > 0 seconds`);
      }
    });

    // Cross-validation: section totals must match total_questions
    if (secs.length > 0 && secTotal > 0 && !isNaN(tq) && tq > 0 && secTotal !== tq) {
      errors.push(`Section questions total (${secTotal}) ≠ total_questions (${tq})`);
    }

    // Icon sanity
    if (config.icon && config.icon.length > 10) errors.push('Icon too long (max 10 chars)');

    return errors;
  }

  async function saveExam(editSlug) {
    const payload = {
      slug: document.getElementById('ex_slug').value.trim(),
      board: document.getElementById('ex_board').value,
      exam_name: document.getElementById('ex_name').value.trim(),
      full_name: document.getElementById('ex_full').value.trim() || null,
      renderer_type: document.getElementById('ex_renderer').value,
      icon: document.getElementById('ex_icon').value.trim() || '📝',
      duration_minutes: parseInt(document.getElementById('ex_dur').value) || 60,
      total_questions: parseInt(document.getElementById('ex_total').value) || 100,
      marks_per_question: parseFloat(document.getElementById('ex_marks').value) || 1,
      negative_marking: parseFloat(document.getElementById('ex_neg').value) || 0,
      category: document.getElementById('ex_board').value,
      description: document.getElementById('ex_desc').value.trim() || null,
      sort_order: parseInt(document.getElementById('ex_sort').value) || 0,
      sections: (window._examSections||[]).filter(s => s.name && s.subject),
      section_locking: document.getElementById('ex_lock').checked,
      section_timers: document.getElementById('ex_timers').checked,
      calculator_allowed: document.getElementById('ex_calc').checked,
      is_active: document.getElementById('ex_active').checked
    };

    // ── Client-side validation ──
    const validationErrors = validateExamClient(payload, !!editSlug);
    if (validationErrors.length > 0) {
      showToast('⚠️ ' + validationErrors[0], 'error');
      // Show all errors if multiple
      if (validationErrors.length > 1) {
        setTimeout(() => showToast(`${validationErrors.length} total validation errors`, 'error'), 500);
      }
      console.warn('[Exam Validator]', validationErrors);
      return;
    }

    try {
      const action = editSlug ? 'update-exam' : 'create-exam';
      if (editSlug) payload.slug = editSlug;
      await adminAPI(action, payload);
      showToast(editSlug ? 'Exam updated!' : 'Exam created!', 'success');
      switchTab('exams');
    } catch(e) { showToast(e.message, 'error'); }
  }
  window.saveExam = saveExam;

  function showToast(msg, type='info') {
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => t.classList.add('visible'));
    setTimeout(() => { t.classList.remove('visible'); setTimeout(()=>t.remove(),300); }, 3000);
  }
