<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MockTestPro Admin Panel — Manage questions, bulk upload, and view analytics.">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Panel — MockTestPro</title>

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/admin.css">
</head>

<body>
  <!-- Mobile Sidebar Toggle -->
  <button class="admin-sidebar-toggle" onclick="AdminApp.toggleSidebar()">☰</button>

  <!-- Sidebar Overlay (mobile) -->
  <div class="admin-sidebar-overlay" onclick="AdminApp.closeSidebar()"></div>

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <a href="admin.html" class="admin-logo">
        <div class="admin-logo-icon">📝</div>
        <div>
          <span class="admin-logo-text">MockTestPro</span>
          <span class="admin-logo-badge">ADMIN</span>
        </div>
      </a>

      <nav class="admin-nav">
        <a class="admin-nav-item active" data-section="dashboard" onclick="AdminApp.navigateTo('dashboard')"
          href="#dashboard">
          <span class="admin-nav-icon">📊</span>
          Dashboard
        </a>
        <a class="admin-nav-item" data-section="questions" onclick="AdminApp.navigateTo('questions')" href="#questions">
          <span class="admin-nav-icon">📋</span>
          Questions
        </a>
        <a class="admin-nav-item" data-section="add" onclick="AdminApp.navigateTo('add')" href="#add">
          <span class="admin-nav-icon">➕</span>
          Add Question
        </a>
        <a class="admin-nav-item" data-section="bulk-upload" onclick="AdminApp.navigateTo('bulk-upload')"
          href="#bulk-upload">
          <span class="admin-nav-icon">📁</span>
          Bulk Upload
        </a>

        <div class="admin-nav-divider"></div>

        <a class="admin-nav-item" data-section="analytics" onclick="AdminApp.navigateTo('analytics')" href="#analytics">
          <span class="admin-nav-icon">📈</span>
          Analytics
        </a>
      </nav>

      <div class="admin-sidebar-footer">
        <a href="index.html" class="admin-back-link">
          ← Back to MockTestPro
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main" id="admin-main">
      <!-- Content rendered by AdminApp.render() -->
    </main>
  </div>

  <!-- Supabase JS Client CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Scripts -->
  <script src="js/supabaseClient.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/storage.js"></script>
  <script src="js/engine/analytics.js"></script>
  <script src="js/admin-app.js"></script>
</body>

</html>
