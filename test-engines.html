    window.Lang = {

  <!-- Test Framework & Assertions -->
  <script>
    const results = {
      passed: 0,
      failed: 0,
      sections: {}
    };

    function describe(sectionName, fn) {
      results.sections[sectionName] = [];
      window.currentSection = sectionName;
      fn();
    }

    function it(testName, fn) {
      try {
        fn();
        results.passed++;
        results.sections[window.currentSection].push({ name: testName, status: 'pass' });
      } catch (err) {
        results.failed++;
        results.sections[window.currentSection].push({ name: testName, status: 'fail', error: err.stack || err.message });
      }
    }

    function assert(cond, msg = 'Assertion failed') {
      if (!cond) throw new Error(msg);
    }

    function assertEquals(actual, expected, msg = '') {
      if (actual !== expected) {
        throw new Error(`${msg ? msg + ': ' : ''}Expected [${expected}] but got [${actual}]`);
      }
    }

    // Deep equality helper for arrays or objects
    function assertDeepEquals(actual, expected, msg = '') {
      const a = JSON.stringify(actual);
      const e = JSON.stringify(expected);
      if (a !== e) {
        throw new Error(`${msg ? msg + ': ' : ''}Expected [${e}] but got [${a}]`);
      }
    }

    function assertBetween(val, min, max, msg = '') {
      if (val < min || val > max) {
        throw new Error(`${msg ? msg + ': ' : ''}Expected ${val} to be between ${min} and ${max}`);
      }
    }
  </script>

  <!-- Assertions Logic -->

        { date: '2026-07-03T10:00:00Z', accuracy: 62, behaviourScore: 64, focusScore: 65, riskIndex: 30, recoveryRate: 45, panicDetected: false, subjectAccuracy: { GK: 48, Quantitative: 68, Reasoning: 75 } },

    // ── 1. LearningIntelligence Engine Tests ──
    describe('LearningIntelligence (Doc 18)', () => {
      it('should detect student cognitive state correctly', () => {
        const stateResult = LearningIntelligence.detectState(sampleResult);
        assert(stateResult.state !== 'unknown', 'State should be calculated');
        assert(stateResult.confidence > 0, 'Confidence should be positive');
      });

      it('should classify mistake based on timing metrics', () => {
        const medianTime = 29;
        const guessMistake = LearningIntelligence.classifyMistake({ timeSpent: 2, isCorrect: false }, medianTime);
        assertEquals(guessMistake, 'guess', 'Very fast wrong answer should be classified as blind guess');

        const conceptMistake = LearningIntelligence.classifyMistake({ timeSpent: 80, isCorrect: false }, medianTime);
        assertEquals(conceptMistake, 'concept', 'Slow wrong answer should be classified as concept gap');
      });

      it('should retrieve overall mistake DNA distribution', () => {
        const dna = LearningIntelligence.getMistakeDNA();
        assert(dna.calculation > 0, 'Should accumulate subject profiles calculation mistakes');
        assert(dna.concept > 0, 'Should accumulate subject profiles concept mistakes');
      });

      it('should evaluate confidence matrix calibration', () => {
        const matrix = LearningIntelligence.getConfidenceMatrix();
        assert(matrix.total > 0, 'Should read mock confidence entries');
        assert(matrix.overPct > 0, 'Should find overconfident percentage');
      });

      it('should calculate focus score', () => {
        const focus = LearningIntelligence.calculateFocusScore(sampleResult);
        assertBetween(focus.score, 0, 100, 'Focus score must range 0-100');
        assert(focus.rapidGuesses >= 0, 'Should track rapid clicks');
      });

      it('should compute learning velocity', () => {
        const vel = LearningIntelligence.getLearningVelocity();
        assert(vel.length > 0, 'Velocity should compute for subjects with history');
        assertEquals(vel[0].subject, 'Quantitative', 'Quantitative should be represented');

      it('should calculate forgetting curves and decay times', () => {
        const curves = LearningIntelligence.getForgettingCurve();
        assert(curves.length > 0, 'Should return forgetting curve metrics');
        assert(curves[0].daysToForget > 0, 'Should calculate decay days');
      });

      it('should generate daily intelligence summary text', () => {
        const report = LearningIntelligence.generateDailyReport();
        assert(report.sections.length > 0, 'Should compile sections');
        assert(report.sections.some(s => s.title === 'Biggest Improvement'), 'Should evaluate growth');
      });
    });

    // ── 2. BehaviourEngine Tests ──
    describe('BehaviourEngine (Doc 19)', () => {
      it('should classify answers into 9 detailed decision types', () => {
        const decisions = BehaviourEngine.classifyDecisions(sampleResult);
        assertEquals(decisions.length, 10, 'All questions classified');
        
        const lucky = decisions.find(d => d.index === 2);
        assertEquals(lucky.decision, 'lucky_guess', 'Fast correct answer is a lucky guess');

        const careless = decisions.find(d => d.index === 5);
        assertEquals(careless.decision, 'careless_error', 'Fast wrong answer is a careless mistake');

        const knowledge = decisions.find(d => d.index === 7);
        assertEquals(knowledge.decision, 'knowledge_error', 'Slow wrong answer is a concept error');
      });

      it('should analyze risk style profiles', () => {
        const risk = BehaviourEngine.analyzeRisk(sampleResult);
        assertBetween(risk.riskIndex, 0, 100, 'Risk index in boundaries');
        assert(risk.riskType !== 'unknown', 'Risk type evaluated');

      it('should detect attention drift and focus collapses', () => {
        const drift = BehaviourEngine.analyzeAttentionDrift(sampleResult);
        assert(drift.windows.length > 0, 'Should compile windows');
      });

      it('should calculate recovery parameters', () => {
        const recovery = BehaviourEngine.analyzeRecovery(sampleResult);
        assert(recovery.recoveryRate >= 0, 'Recovery rate output');

        const panic = BehaviourEngine.detectPanic(sampleResult);
        assert(typeof panic.panicDetected === 'boolean', 'Panic outcome computed');

        const bhScore = BehaviourEngine.calculateBehaviourScore(sampleResult);

        const cause2 = MistakeDNA.rootCause(sampleResult.questionResults[6], 29, null);
        assertEquals(cause2, 'concept', 'Slow wrong is concept');

        const leaks = MistakeDNA.getScoreLeakageMap(sampleResult);
        assert(leaks.recoverableMarks > 0, 'Recoverable marks should be calculated');
        const conceptLeak = leaks.leaks.find(l => l.cause === 'concept');
        assert(conceptLeak && conceptLeak.marks > 0, 'Should capture concept leakage');

  <!-- Execution & DOM Rendering -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const parent = document.getElementById('test-sections');
      
      Object.entries(results.sections).forEach(([sectionName, tests]) => {
        const sectionEl = document.createElement('div');
        sectionEl.className = 'test-section';
        
        let sectionFailed = false;
        const testItemsHTML = tests.map(t => {
          if (t.status === 'fail') sectionFailed = true;
          return `
            <div class="test-item">
              <div>
                <div class="test-name">${t.name}</div>
                ${t.error ? `<div class="error-log">${t.error}</div>` : ''}
              </div>
              <div class="test-status ${t.status}">${t.status.toUpperCase()}</div>
            </div>
          `;
        }).join('');

        sectionEl.innerHTML = `
          <div class="section-title">
            <span>${sectionName}</span>
            <span style="color: ${sectionFailed ? '#ef4444' : '#10b981'}">
              ${tests.filter(t => t.status === 'pass').length}/${tests.length} Passed
            </span>
          </div>
          <div class="test-list">${testItemsHTML}</div>
        `;
        
        parent.appendChild(sectionEl);
      });

      // Update summary card
      const summaryCard = document.getElementById('summary-card');
      const summaryTitle = document.getElementById('summary-title');
      const summaryStats = document.getElementById('summary-stats');

      const totalTests = results.passed + results.failed;
      summaryStats.innerHTML = `Tests Run: ${totalTests} | Passed: ${results.passed} | Failed: ${results.failed}`;

      if (results.failed === 0) {
        summaryCard.className = 'summary-card all-passed';
        summaryTitle.innerHTML = `=== TEST RESULTS: ${results.passed}/${totalTests} passed, 0 failed ===`;
      } else {
        summaryCard.className = 'summary-card has-failed';
        summaryTitle.innerHTML = `=== TEST RESULTS: ${results.passed}/${totalTests} passed, ${results.failed} failed ===`;
      }
    });
  </script>
