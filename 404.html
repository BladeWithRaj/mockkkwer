<!DOCTYPE html>
<html lang="hi-en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found — Mock24hr. Go back to the homepage and continue practicing.">
  <title>404 — Page Not Found | Mock24hr</title>
  <link rel="icon" href="/icons/icon-192.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --primary: #4F46E5; --bg: #0F1117; --bg2: #1A1D27; --border: rgba(255,255,255,0.08); --text: #F1F5F9; --muted: #94A3B8; --font: 'Plus Jakarta Sans', sans-serif; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; overflow: hidden; }
    /* Animated background orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.15; animation: float 6s ease-in-out infinite; pointer-events: none; }
    .orb1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 300px; height: 300px; background: #7C3AED; bottom: -80px; right: -80px; animation-delay: 3s; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
    .content { position: relative; z-index: 1; max-width: 520px; }
    .error-code { font-size: clamp(80px, 20vw, 140px); font-weight: 800; letter-spacing: -0.04em; background: linear-gradient(135deg, var(--primary), #7C3AED); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 16px; }
    h1 { font-size: clamp(20px, 4vw, 28px); font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; color: var(--muted); margin-bottom: 36px; line-height: 1.7; }
    .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary { padding: 13px 28px; background: var(--primary); color: #fff; border-radius: 12px; text-decoration: none; font-size: 14.5px; font-weight: 700; transition: opacity 0.2s, transform 0.15s; }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-2px); }
    .btn-secondary { padding: 13px 28px; border: 1px solid var(--border); color: var(--muted); border-radius: 12px; text-decoration: none; font-size: 14.5px; font-weight: 600; transition: border-color 0.2s, color 0.2s; }
    .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
    .icon { font-size: 56px; margin-bottom: 20px; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    .quick-links { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 36px; }
    .quick-link { padding: 8px 18px; background: var(--bg2); border: 1px solid var(--border); border-radius: 100px; font-size: 13px; color: var(--muted); text-decoration: none; transition: border-color 0.2s, color 0.2s; }
    .quick-link:hover { border-color: var(--primary); color: var(--primary); }
    .logo { position: absolute; top: 20px; left: 24px; font-size: 18px; font-weight: 800; letter-spacing: -0.03em; color: var(--primary); text-decoration: none; }
    .logo span { color: var(--text); }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <a href="/" class="logo">Mock<span>24hr</span></a>

  <div class="content">
    <div class="icon">🔍</div>
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>Arey! Yeh page toh exist hi nahi karta. Shayad URL galat hai ya page delete ho gaya. Ghabrao mat — home page pe wapas jao aur practice continue karo! 😄</p>
    <div class="btns">
      <a href="/" class="btn-primary">🏠 Go to Home</a>
      <a href="javascript:history.back()" class="btn-secondary">← Go Back</a>
    </div>
    <div class="quick-links">
      <a href="/#board?id=SSC" class="quick-link">📋 SSC Mocks</a>
      <a href="/#board?id=Railway" class="quick-link">🚆 Railway Mocks</a>
      <a href="/#board?id=Banking" class="quick-link">🏦 Banking Mocks</a>
      <a href="/#dashboard" class="quick-link">📊 Dashboard</a>
    </div>
  </div>
</body>
</html>
