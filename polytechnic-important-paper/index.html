<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTEUP Paper Generator — Real Board Pattern Papers</title>
  <meta name="description" content="Generate authentic BTEUP polytechnic exam papers with real board patterns. Mathematics-II and FEEE supported. Bilingual EN+HI format.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+Devanagari:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/polytechnic-paper.css">
</head>
<body class="polytechnic-generator">

  <!-- ═══ HERO ═══ -->
  <div class="pg-hero">
    <a href="/" class="pg-hero-back">← Back to MockTestPro</a>
    <h1>📄 BTEUP Paper Generator</h1>
    <p>Authentic board-pattern exam papers — Real BTEUP format</p>
    <div class="pg-hero-badge">🎯 Pattern-Based Engine · Mathematics-II & FEEE</div>
  </div>

  <!-- ═══ MAIN CONTAINER ═══ -->
  <div class="pg-container">

    <!-- ═══ FORM CARD ═══ -->
    <div class="pg-card" id="formCard">
      <div class="pg-card-title">⚡ Paper Configuration</div>

      <div class="pg-form-grid">
        <div class="pg-form-group">
          <label>Branch</label>
          <select id="branchSelect">
            <!-- Populated by JS -->
          </select>
        </div>

        <div class="pg-form-group">
          <label>Semester</label>
          <select id="semesterSelect">
            <!-- Populated by JS -->
          </select>
        </div>

        <div class="pg-form-group full-width">
          <label>Subject</label>
          <select id="subjectSelect">
            <option value="">Select Subject...</option>
          </select>
        </div>

        <div class="pg-form-group full-width">
          <label>Paper Language</label>
          <div class="pg-lang-toggle">
            <button type="button" class="pg-lang-btn" data-lang="english">🇬🇧 English</button>
            <button type="button" class="pg-lang-btn active" data-lang="bilingual">🇮🇳 Bilingual</button>
            <button type="button" class="pg-lang-btn" data-lang="hindi">हिन्दी</button>
          </div>
          <div id="langHint" style="font-size:0.72rem;color:var(--text-muted);margin-top:5px;font-style:italic">Bilingual — English + Hindi</div>
        </div>
      </div>

      <!-- Subject Info -->
      <div id="subjectInfo" style="display:none"></div>

      <!-- Generate Button -->
      <button class="pg-btn-generate" id="generateBtn">
        ⚡ Generate BTEUP Paper
      </button>
    </div>

    <!-- ═══ ERROR ═══ -->
    <div class="pg-error" id="errorMsg">
      <div id="errorText"></div>
      <button class="pg-error-retry" onclick="generatePaper()">🔄 Try Again</button>
    </div>

    <!-- ═══ PAPER OUTPUT ═══ -->
    <div class="pg-output" id="paperOutput">
      <div class="pg-output-actions">
        <button class="btn-print" onclick="printPaper()">🖨️ Print Paper</button>
        <button class="btn-copy" onclick="copyPaper()">📋 Copy Text</button>
        <button onclick="generateAnother()">🔄 Generate Another</button>
      </div>
      <div class="bteup-paper" id="paperSheet"></div>
    </div>
  </div>

  <!-- ═══ FULLSCREEN LOADING OVERLAY ═══ -->
  <div class="pg-loading-overlay" id="loadingOverlay">
    <!-- Animated Paper Preview -->
    <div class="pg-loading-paper">
      <div class="paper-lines">
        <div class="paper-line"></div>
        <div class="paper-line"></div>
        <div class="paper-line"></div>
        <div class="paper-line"></div>
        <div class="paper-line"></div>
        <div class="paper-line"></div>
        <div class="paper-line"></div>
        <div class="paper-line"></div>
        <div class="paper-line"></div>
        <div class="paper-line"></div>
      </div>
    </div>

    <!-- Progress -->
    <div class="pg-progress-container">
      <div class="pg-progress-bar">
        <div class="pg-progress-fill"></div>
      </div>
      <div class="pg-stage-text">Initializing...</div>
      <div class="pg-stage-sub"></div>
    </div>

    <!-- Topic Chips -->
    <div class="pg-topic-chips">
      <!-- Populated dynamically based on selected subject -->
    </div>
  </div>

  <script src="/js/polytechnic-generator.js"></script>
</body>
</html>
